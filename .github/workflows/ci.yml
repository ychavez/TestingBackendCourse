name: CI

on:
  push:
    branches:
     - '**'
  pull_request:
    branches: 
      - '**'
  workflow_dispatch:

jobs:
  unit-and-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore TestingBackendCourse.sln

      - name: Build
        run: dotnet build TestingBackendCourse.sln --configuration Release --no-restore

      - name: Run Unit Tests
        run: dotnet test Course.UnitTest/Course.UnitTest.csproj --configuration Release --no-build --logger "trx;LogFileName=unit-tests.trx" --results-directory TestResults

      - name: Run API Integration Tests
        run: dotnet test Course.Api.IntegrationTest/Course.Api.IntegrationTest.csproj --configuration Release --no-build --logger "trx;LogFileName=integration-tests.trx" --results-directory TestResults

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-integration-test-results
          path: TestResults/**/*.trx

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore TestingBackendCourse.sln

      - name: Build
        run: dotnet build TestingBackendCourse.sln --configuration Release --no-restore

      - name: Install Playwright Browsers
        shell: pwsh
        run: |
          $script = Get-ChildItem -Path "Course.Web.E2ETest/bin/Release" -Recurse -Filter playwright.ps1 | Select-Object -First 1
          if (-not $script) { throw "playwright.ps1 not found" }
          & $script.FullName install --with-deps chromium

      - name: Start API
        run: |
          nohup dotnet run --project src/Course.Api/Course.Api.csproj --configuration Release --no-build --urls "http://localhost:5151" > api.log 2>&1 &
          echo $! > api.pid

      - name: Wait for API
        run: |
          for i in {1..40}; do
            if curl -fsS http://localhost:5151/health > /dev/null; then
              echo "API is up"; exit 0
            fi
            sleep 2
          done
          echo "API did not start in time"; cat api.log; exit 1

      - name: Start Web
        run: |
          nohup dotnet run --project src/Course.Web/Course.Web.csproj --configuration Release --no-build --urls "http://localhost:5206" > web.log 2>&1 &
          echo $! > web.pid

      - name: Wait for Web
        run: |
          for i in {1..40}; do
            if curl -fsS http://localhost:5206/health > /dev/null; then
              echo "Web is up"; exit 0
            fi
            sleep 2
          done
          echo "Web did not start in time"; cat web.log; exit 1

      - name: Run E2E Tests
        run: dotnet test Course.Web.E2ETest/Course.Web.E2ETest.csproj --configuration Release --no-build --settings Course.Web.E2ETest/ci.runsettings --logger "trx;LogFileName=e2e-tests.trx" --results-directory TestResults

      - name: Stop API & Web
        if: always()
        run: |
          if [ -f api.pid ]; then kill $(cat api.pid) || true; fi
          if [ -f web.pid ]; then kill $(cat web.pid) || true; fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            TestResults/**/*.trx
            Course.Web.E2ETest/bin/Release/**/*.png
            api.log
            web.log
